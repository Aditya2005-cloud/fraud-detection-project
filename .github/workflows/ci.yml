name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend smoke tests
        run: |
          python -m unittest \
            tests.test_app.FraudApiTests.test_health_endpoint \
            tests.test_app.FraudApiTests.test_api_health_alias \
            tests.test_app.FraudApiTests.test_predict_requires_full_payload \
            -v

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
